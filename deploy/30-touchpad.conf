Section "InputClass"
    Identifier "libinput touchpad catchall"
    MatchIsTouchpad "on"
    Driver "libinput"
    Option "ClickMethod" "clickfinger"
    Option "DisableWhileTyping" "true"
    Option "MiddleEmulation" "true"
    Option "NaturalScrolling" "true"
    Option "Tapping" "true"
EndSection
